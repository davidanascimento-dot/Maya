<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maya — Conversa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #0b141a;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 100%;
            height: 100%;
            max-width: 100%;
            background-color: #0b141a;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-header {
            background-color: #111b21;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            border-bottom: 1px solid #222d34;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-icon {
            color: #aebac1;
            font-size: 18px;
            cursor: pointer;
        }

        .avatar-wrapper {
            position: relative;
            cursor: pointer;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background-color: #e91e63;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            background-size: cover;
            background-position: center;
            transition: opacity 0.2s;
        }

        .avatar-wrapper:hover .avatar {
            opacity: 0.8;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            color: #e9edef;
            font-size: 16px;
            font-weight: 500;
        }

        .user-status {
            color: #8696a0;
            font-size: 13px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 25px;
            color: #aebac1;
            font-size: 18px;
        }

        .header-right i {
            cursor: pointer;
        }

        .chat-messages {
            flex: 1;
            padding: 20px 5%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background-color: #0b141a;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #2a3942;
            border-radius: 4px;
        }

        .mensagem {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14.2px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
            box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .mensagem.usuario {
            align-self: flex-end;
            background: #005c4b;
            color: #e9edef;
            border-bottom-right-radius: 4px;
        }

        .mensagem.maya {
            align-self: flex-start;
            background: #202c33;
            color: #e9edef;
            border-bottom-left-radius: 4px;
        }

        .mensagem .prefixo {
            font-size: 10px;
            color: #8696a0;
            margin-bottom: 4px;
            text-transform: lowercase;
            letter-spacing: 0.5px;
        }

        .mensagem.maya .prefixo {
            color: #00a884;
        }

        .mensagem .horario {
            font-size: 10px;
            color: #8696a0;
            text-align: right;
            margin-top: 4px;
            align-self: flex-end;
        }

        .digitando {
            align-self: flex-start;
            color: #8696a0;
            font-size: 13px;
            padding: 8px 12px;
            background: #202c33;
            border-radius: 8px;
            border-bottom-left-radius: 4px;
            animation: piscar 1.4s infinite;
        }

        @keyframes piscar {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.9; }
        }

        .chat-footer {
            background-color: #111b21;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            height: 60px;
            border-top: 1px solid #222d34;
            flex-shrink: 0;
        }

        .input-wrapper {
            flex: 1;
            background-color: #2a3942;
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            height: 42px;
        }

        .emoji-icon {
            color: #8696a0;
            font-size: 20px;
            cursor: pointer;
            margin-right: 12px;
        }

        .message-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: #e9edef;
            font-size: 15px;
            padding: 8px 0;
        }

        .message-input::placeholder {
            color: #8696a0;
        }

        .action-btn {
            color: #8696a0;
            font-size: 20px;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            transition: 0.2s;
        }

        .action-btn:hover {
            color: #00a884;
        }

        .sugestoes {
            display: flex;
            gap: 8px;
            padding: 6px 16px 10px;
            background: #0b141a;
            flex-wrap: wrap;
            border-top: 1px solid #1f2c34;
            flex-shrink: 0;
        }

        .sugestao {
            font-size: 12px;
            color: #8696a0;
            background: #1f2c34;
            padding: 4px 14px;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #2a3942;
        }

        .sugestao:hover {
            background: #2a3942;
            color: #e9edef;
            border-color: #00a884;
        }

        .footer {
            text-align: center;
            font-size: 10px;
            color: #1f2c34;
            padding: 4px;
            letter-spacing: 1px;
            background: #0b141a;
            flex-shrink: 0;
        }

        @media (min-width: 768px) {
            body {
                background-color: #1f2c34;
            }
            .chat-container {
                width: 420px;
                height: 850px;
                border-radius: 10px;
                overflow: hidden;
                box-shadow: 0 12px 28px rgba(0,0,0,0.3);
            }
        }

        @media (max-width: 480px) {
            .chat-container {
                max-height: 100vh;
                border-radius: 0;
            }
            .mensagem { font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="chat-container">

    <!-- HEADER -->
    <header class="chat-header">
        <div class="header-left">
            <i class="fas fa-arrow-left back-icon"></i>
            <div class="avatar-wrapper" onclick="document.getElementById('file-input').click();" title="Trocar foto">
                <div class="avatar" id="avatar-image">M</div>
                <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="updateAvatar(this)">
            </div>
            <div class="user-info">
                <span class="user-name">Maya</span>
                <span class="user-status" id="statusDisplay">online</span>
            </div>
        </div>
        <div class="header-right">
            <i class="fas fa-video"></i>
            <i class="fas fa-phone"></i>
            <i class="fas fa-ellipsis-vertical"></i>
        </div>
    </header>

    <!-- MESSAGES -->
    <main class="chat-messages" id="chatMessages"></main>

    <!-- INPUT -->
    <footer class="chat-footer">
        <div class="input-wrapper">
            <i class="far fa-face-smile emoji-icon"></i>
            <input type="text" id="inputMensagem" placeholder="Mensagem" class="message-input">
        </div>
        <button class="action-btn" id="btnEnviar">
            <i class="fas fa-microphone" id="mic-icon"></i>
        </button>
    </footer>

    <!-- SUGESTÕES -->
   

    <div class="footer">✦ espaço seguro ✦</div>
</div>

<script src="maya.js"></script>
<script>
    // ============================================================
    // AUTO SAVE LOCAL — salva e carrega mensagens do localStorage
    // ============================================================

    const STORAGE_KEY = 'maya_chat_messages';
    const chatMessages = document.getElementById('chatMessages');

    function saveMessages() {
        const items = [];
        const children = chatMessages.children;
        for (let i = 0; i < children.length; i++) {
            const el = children[i];
            // Pula o elemento de "digitando" se existir
            if (el.classList && el.classList.contains('digitando')) continue;
            items.push(el.outerHTML);
        }
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
        } catch (e) {
            // ignora
        }
    }

    function loadMessages() {
        try {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (!stored) return false;
            const items = JSON.parse(stored);
            if (!items || items.length === 0) return false;

            // Remove mensagens atuais (exceto as que podem ter sido carregadas pelo JS)
            chatMessages.innerHTML = '';
            for (const html of items) {
                const temp = document.createElement('div');
                temp.innerHTML = html;
                const child = temp.firstElementChild;
                if (child) {
                    chatMessages.appendChild(child);
                }
            }
            return true;
        } catch (e) {
            return false;
        }
    }

    // Salva sempre que uma nova mensagem for adicionada (observa mudanças)
    const observer = new MutationObserver(() => {
        saveMessages();
    });

    // Observa o container de mensagens
    observer.observe(chatMessages, { childList: true, subtree: false });

    // ============================================================
    // Avatar
    // ============================================================
    function updateAvatar(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const avatarElement = document.getElementById('avatar-image');
                avatarElement.style.backgroundImage = `url('${e.target.result}')`;
                avatarElement.textContent = '';
                // Salva avatar no localStorage também
                try {
                    localStorage.setItem('maya_avatar', e.target.result);
                } catch (err) {}
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // Carrega avatar salvo
    (function loadAvatar() {
        try {
            const saved = localStorage.getItem('maya_avatar');
            if (saved) {
                const avatarElement = document.getElementById('avatar-image');
                avatarElement.style.backgroundImage = `url('${saved}')`;
                avatarElement.textContent = '';
            }
        } catch (e) {}
    })();

    // ============================================================
    // Ícone microfone/avião
    // ============================================================
    const inputField = document.getElementById('inputMensagem');
    const micIcon = document.getElementById('mic-icon');

    if (inputField && micIcon) {
        inputField.addEventListener('input', function() {
            if (this.value.trim() !== '') {
                micIcon.className = 'fas fa-paper-plane';
                micIcon.style.color = '#00a884';
            } else {
                micIcon.className = 'fas fa-microphone';
                micIcon.style.color = '#8696a0';
            }
        });
    }

    // ============================================================
    // Carrega mensagens salvas ao iniciar
    // ============================================================
    // Se não houver mensagens salvas, o JS da Maya vai injetar "oi"
    const hasLoaded = loadMessages();

    // Se não carregou nada, a página vai mostrar vazio até o JS da Maya adicionar "oi"
    // O JS da Maya chama adicionarMensagem, e o MutationObserver salvará automaticamente
</script>
</body>
</html>
